name: travel_trace
description: "TravelTrace — Interactive GPS travel mapping and itinerary app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # ── UI & Icons ────────────────────────────────────────────
  cupertino_icons: ^1.0.8

  # ── Map rendering (OpenStreetMap — no API key required) ───
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # ── GPS / Location ────────────────────────────────────────
  geolocator: ^13.0.1

  # ── Networking ────────────────────────────────────────────
  http: ^1.2.1

  # ── State Management ──────────────────────────────────────
  provider: ^6.1.2

  # ── Utilities ─────────────────────────────────────────────
  intl: ^0.19.0       # Date formatting

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Google Fonts are loaded via CDN — no local asset needed.
  # flutter_map tiles are served by OpenStreetMap servers.
